<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        try {
          if (localStorage.getItem("opskb_theme") === "light") {
            document.documentElement.setAttribute("data-theme", "light");
          }
        } catch (e) {}
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Desert Lamp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700&family=Noto+Sans+Arabic:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/tokens.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/components.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-nav">
        <a class="app-nav__brand" href="index.html">Desert Lamp</a>
        <div class="app-nav__end">
          <nav class="app-nav__actions" aria-label="Account">
            <a
              id="nav-edit-current"
              class="btn btn--tertiary hidden"
              href="editor.html"
              >Edit page</a
            >
            <div class="app-nav__search">
              <div class="search-field-wrap search-field-wrap--nav">
                <label class="sr-only" for="global-search">Search articles</label>
                <input
                  id="global-search"
                  class="search-field search-field--nav"
                  type="search"
                  placeholder="Search"
                  autocomplete="off"
                />
                <span class="search-field__icon-trail" aria-hidden="true">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    width="22"
                    height="22"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <circle cx="11" cy="11" r="7" />
                    <path d="M21 21l-4.35-4.35" />
                  </svg>
                </span>
                <div
                  id="search-suggest"
                  class="search-suggest search-suggest--hidden"
                  role="listbox"
                  aria-live="polite"
                ></div>
              </div>
            </div>
            <a
              id="nav-pending-reviews"
              class="btn btn--tertiary hidden"
              href="pending.html"
              >Pending reviews</a
            >
            <a
              id="nav-new-article"
              class="btn btn--tertiary hidden"
              href="editor.html"
              >New article</a
            >
            <span id="nav-user-email" class="text-muted"></span>
            <button
              type="button"
              id="theme-toggle"
              class="theme-switch"
              role="switch"
              aria-checked="false"
              aria-label="Switch to light mode"
              title="Use light theme"
            >
              <span class="theme-switch__track">
                <span class="theme-switch__label theme-switch__label--dark"
                  >Dark mode</span
                >
                <span class="theme-switch__lane">
                  <span class="theme-switch__thumb">
                    <svg
                      class="theme-switch__icon theme-switch__icon--sun"
                      xmlns="http://www.w3.org/2000/svg"
                      viewBox="0 0 24 24"
                      width="18"
                      height="18"
                      aria-hidden="true"
                      focusable="false"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="1.75"
                      stroke-linecap="round"
                    >
                      <circle cx="12" cy="12" r="4" />
                      <path
                        d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"
                      />
                    </svg>
                    <svg
                      class="theme-switch__icon theme-switch__icon--moon"
                      xmlns="http://www.w3.org/2000/svg"
                      viewBox="0 0 24 24"
                      width="18"
                      height="18"
                      aria-hidden="true"
                      focusable="false"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="1.75"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    >
                      <path
                        d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"
                      />
                    </svg>
                  </span>
                </span>
                <span class="theme-switch__label theme-switch__label--light"
                  >Light mode</span
                >
              </span>
            </button>
            <button type="button" class="btn btn--secondary" data-action="logout">
              Sign out
            </button>
          </nav>
        </div>
      </header>

      <div
        id="home-flash"
        class="home-flash hidden"
        role="status"
        aria-live="polite"
      ></div>

      <div class="app-layout">
        <aside class="app-sidebar">
          <div class="card card--elevated app-sidebar__trending">
            <div class="card__header">
              <h2 class="card__title">Top clicked</h2>
            </div>
            <div id="trending-list-root" class="trending-list-root"></div>
          </div>
        </aside>

        <main class="app-content">
          <div id="article-empty" class="content-empty">
            <h1 class="hero__title">Select an article or search for One</h1>
            <p class="hero__subtitle">
              Use the search bar above or a link under Top clicked to load an
              article here.
            </p>
          </div>
          <div id="article-error" class="form-error hidden" role="alert"></div>
          <article id="article-panel" class="card content-article hidden">
            <header class="content-article__header">
              <h1
                id="article-title"
                class="content-article__title"
                lang="en"
              ></h1>
              <p
                id="article-byline"
                class="content-article__byline text-muted hidden"
              ></p>
            </header>
            <div
              id="article-content"
              class="article-prose article-prose--english"
              lang="en"
            ></div>
            <section
              id="article-ar-section"
              class="article-ar-section hidden"
              lang="ar"
              dir="rtl"
              aria-label="Arabic"
            >
              <h2 class="article-ar-section__label">العربية</h2>
              <p
                id="article-title-ar"
                class="content-article__title-ar hidden"
                lang="ar"
                dir="rtl"
              ></p>
              <div
                id="article-content-ar"
                class="article-prose article-prose--arabic"
              ></div>
            </section>
          </article>
        </main>
      </div>
    </div>

    <script type="module" src="js/home.js"></script>
  </body>
</html>
